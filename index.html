<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Loading…</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lekton:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ─── Library Screen (story select) ────────────────────────── -->
  <div id="library-screen">
    <div id="library-content">
      <p class="screen-eyebrow">Stories</p>
      <div id="story-list"></div>
    </div>
    <p id="title-footer">Select a story to begin</p>
  </div>

  <!-- ─── Title Screen ─────────────────────────────────────────── -->
  <div id="title-screen" class="hidden">
    <div id="title-content">
      <p id="title-eyebrow" class="reveal-el">A text adventure</p>
      <h1 id="game-title" class="reveal-el"></h1>
      <p id="game-subtitle" class="reveal-el"></p>
      <div id="title-actions" class="reveal-el">
        <button id="btn-new">Begin</button>
        <button id="btn-continue" class="hidden">Continue</button>
      </div>
      <button id="btn-title-back" class="reveal-el">← all stories</button>
    </div>
    <p id="title-footer">Click anywhere during text to skip · Space or Enter also works</p>
  </div>

  <!-- ─── Chapter Select Screen ────────────────────────────────── -->
  <div id="chapter-screen" class="hidden">
    <div id="chapter-content">
      <p class="screen-eyebrow">Chapters</p>
      <div id="chapter-list"></div>
      <button id="btn-chapter-back">← back</button>
    </div>
  </div>

  <!-- ─── Previously Screen ────────────────────────────────────── -->
  <div id="previously-screen" class="hidden">
    <div id="previously-content">
      <p class="screen-eyebrow">Previously</p>
      <p id="prev-chapter-label"></p>
      <p id="prev-chapter-text"></p>
      <div id="prev-actions"></div>
      <button id="btn-prev-back">← chapters</button>
    </div>
  </div>

  <!-- ─── Chapter Card (full-screen title reveal) ─────────────── -->
  <div id="chapter-card" class="hidden">
    <div id="chapter-card-inner">
      <span id="chapter-card-numeral"></span>
      <span id="chapter-card-title"></span>
    </div>
  </div>

  <!-- ─── Game Screen ───────────────────────────────────────────── -->
  <div id="game-screen" class="hidden">

    <!-- Top-left UI -->
    <div id="nav-bar">
      <button id="btn-game-back" title="Back to stories">← stories</button>
    </div>

    <!-- Top-right UI -->
    <div id="ui-bar">
      <button id="inventory-btn" title="Inventory (I)">
        <span>carried</span>
        <span id="inventory-count">0</span>
      </button>
    </div>

    <!-- Inventory Drawer -->
    <div id="inventory-panel" aria-hidden="true">
      <div id="inventory-header">
        <span class="panel-label">Carried Items</span>
        <button id="inventory-close" aria-label="Close inventory">✕</button>
      </div>
      <div id="inventory-list">
        <p class="inv-empty">Nothing carried.</p>
      </div>
    </div>

    <!-- Main prose + choices -->
    <main id="game">
      <div id="scene-text"></div>
      <div id="choices-container" class="hidden"></div>
    </main>

  </div>

  <!-- ─── Item Notification ─────────────────────────────────────── -->
  <div id="item-notification" aria-live="polite">
    <span class="notif-label">Item discovered</span>
    <span id="item-notif-name"></span>
    <span id="item-notif-desc"></span>
  </div>

  <script src="js/engine.js"></script>
</body>
</html>
