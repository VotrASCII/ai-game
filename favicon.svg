<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0a"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#2a2520" stroke-width="0.75"/>

  <!-- Cardinal tick marks (subtle) -->
  <line x1="16" y1="2.5" x2="16" y2="5"   stroke="#3a3028" stroke-width="0.8"/>
  <line x1="16" y1="27"  x2="16" y2="29.5" stroke="#3a3028" stroke-width="0.8"/>
  <line x1="2.5" y1="16" x2="5"   y2="16"  stroke="#3a3028" stroke-width="0.8"/>
  <line x1="27"  y1="16" x2="29.5" y2="16" stroke="#3a3028" stroke-width="0.8"/>

  <!-- Compass needle — rotated ~22° off north (wayward) -->
  <g transform="rotate(22, 16, 16)">
    <!-- North half: warm gold -->
    <path d="M16,5 L19,16 L16,13.5 L13,16 Z" fill="#9c8a6e"/>
    <!-- South half: dark, barely visible -->
    <path d="M16,27 L19,16 L16,18.5 L13,16 Z" fill="#2e2418"/>
  </g>

  <!-- Center pivot -->
  <circle cx="16" cy="16" r="2"   fill="#0a0a0a"/>
  <circle cx="16" cy="16" r="1.1" fill="#9c8a6e"/>
</svg>
